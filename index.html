<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Store</title>

<!-- Facebook Pixel -->
<script>
!function(f,b,e,v,n,t,s){
if(f.fbq)return;n=f.fbq=function(){n.callMethod?
n.callMethod.apply(n,arguments):n.queue.push(arguments)};
if(!f._fbq)f._fbq=n;
n.push=n;n.loaded=!0;n.version='2.0';
n.queue=[];t=b.createElement(e);t.async=!0;
t.src=v;s=b.getElementsByTagName(e)[0];
s.parentNode.insertBefore(t,s)
}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');

fbq('init', 'YOUR_PIXEL_ID');
fbq('track', 'PageView');
</script>

<style>
body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
}

/* Header */
header{
display:flex;
justify-content:space-between;
padding:15px;
background:#111;
position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:22px;
font-weight:bold;
color:gold;
}

.cart{
cursor:pointer;
}

/* Hero */
.hero{
height:60vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(to right,black,#111);
font-size:30px;
}

/* Products */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
transition:.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(212,175,55,.4);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:8px;
}

button{
padding:10px;
margin-top:10px;
background:gold;
border:none;
cursor:pointer;
font-weight:bold;
}

/* Cart Popup */
.cartBox{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:.4s;
}

.cartBox.active{
right:0;
}

input, textarea{
width:100%;
padding:10px;
margin:5px 0;
background:#222;
border:none;
color:white;
}

/* Footer */
footer{
text-align:center;
padding:20px;
background:#111;
margin-top:20px;
}
</style>

</head>

<body>

<header>
<div class="logo">Luxury</div>
<div class="cart" onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</header>

<div class="hero">
🔥 Premium Collection
</div>

<div class="products">

<div class="card">
<img src="https://picsum.photos/300/300?1">
<h3>Black Trouser</h3>
<p>৳1200</p>
<button onclick="addToCart('Black Trouser')">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/300?2">
<h3>White Shirt</h3>
<p>৳1000</p>
<button onclick="addToCart('White Shirt')">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/300?3">
<h3>Hoodie</h3>
<p>৳1500</p>
<button onclick="addToCart('Hoodie')">Add to Cart</button>
</div>

</div>

<!-- Cart -->
<div class="cartBox" id="cartBox">
<h2>Your Cart</h2>
<ul id="cartItems"></ul>

<h3>Order Form</h3>
<input placeholder="Your Name">
<input placeholder="Phone">
<textarea placeholder="Address"></textarea>
<button onclick="orderNow()">Place Order</button>
</div>

<footer>
© 2026 Luxury Store
</footer>

<script>
let cart = [];

function addToCart(product){
cart.push(product);
updateCart();
fbq('track', 'AddToCart');
}

function updateCart(){
document.getElementById("count").innerText = cart.length;

let list = document.getElementById("cartItems");
list.innerHTML = "";

cart.forEach(item=>{
let li = document.createElement("li");
li.innerText = item;
list.appendChild(li);
});
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active");
}

function orderNow(){
alert("Order Placed!");
fbq('track', 'Purchase');
}
</script>

</body>
</html>
