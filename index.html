<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>90's Club</title><style>
body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
}

/* Header */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:black;
color:white;
font-weight:bold;
font-size:20px;
}

.logoBox{
display:flex;
align-items:center;
gap:12px;
}

.logoBox img{
width:45px;
height:45px;
border-radius:50%;
}

.logoBox span{
font-size:20px;
font-weight:700;
color:silver;
}

/* Hero */
.hero{
height:60vh;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
}

/* Products */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#111;
padding:15px;
border-radius:10px;
transition:.3s;
}

.card{
transition:0.3s;
}
.card:hover{
transform:scale(1.05);
box-shadow:0 10px 20px rgba(0,0,0,0.3);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

button{
padding:10px;
background:gold;
border:none;
cursor:pointer;
}

/* Cart */
.cartBox{
position:fixed;
right:-100%;
top:0;
width:300px;
height:100%;
background:#111;
padding:20px;
transition:.4s;
}

.cartBox.active{
right:0;
}
</style></head>
<body>
<header>
<div class="logoBox">
<img src="logo.png">
<span>90’s CLUB</span>
</div><div onclick="toggleCart()">🛒 (<span id="count">0</span>)</div>
</header><div class="hero">
🔥 Premium Collection
</div><div class="products"><div class="card">
<img src="trouser1.jpg">
<h3>Black Trouser</h3>
<p>৳1200</p>
<button onclick="addToCart('Black Trouser')">Add</button>
</div><div class="card">
<img src="trouser2.jpg">
<h3>Gray Trouser</h3>
<p>৳1300</p>
<button onclick="addToCart('Gray Trouser')">Add</button>
</div><div class="card">
<img src="trouser3.jpg">
<h3>Classic Trouser</h3>
<p>৳1400</p>
<button onclick="addToCart('Classic Trouser')">Add</button>
</div></div><div class="cartBox" id="cartBox">
<h2>Cart</h2>
<ul id="cartItems"></ul>
<button onclick="orderNow()">Order Now</button>
</div>
<script>
let cart = [];

function addToCart(product){
cart.push(product);
updateCart();
}

function updateCart(){
document.getElementById("count").innerText = cart.length;

let list = document.getElementById("cartItems");
list.innerHTML = "";

cart.forEach(item=>{
let li = document.createElement("li");
li.innerText = item;
list.appendChild(li);
});
}

function toggleCart(){
document.getElementById("cartBox").classList.toggle("active");
}

function orderNow(product){
let phone = "8801849379559";
let msg = "I want to order " + product;
window.open("https://wa.me/"+phone+"?text="+encodeURIComponent(msg));
}
