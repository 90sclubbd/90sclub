<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>90's Club</title>

<style>

/* ===== BODY ===== */
body{
margin:0;
background:#000;
color:#fff;
font-family:sans-serif;
text-align:center;
}

/* ===== HEADER ===== */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
position:sticky;
top:0;
}

header h2{
color:gold;
}

/* ===== BUTTON ===== */
button{
padding:10px;
background:gold;
border:none;
cursor:pointer;
border-radius:5px;
}

/* ===== PRODUCTS ===== */
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
padding:20px;
}

/* ===== CARD ===== */
.card{
background:#111;
padding:15px;
border-radius:10px;
transition:.3s;
opacity:0;
transform:translateY(30px);
animation:fadeIn .5s forwards;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(212,175,55,.4);
}

img{
width:100%;
height:200px;
object-fit:cover;
border-radius:10px;
}

/* ===== CART PAGE ===== */
#cartPage{
display:none;
padding:20px;
}

input{
padding:10px;
margin:5px;
width:80%;
}

/* ===== ANIMATION ===== */
@keyframes fadeIn{
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<header>
<h2>90's Club</h2>

<button onclick="showCart()">
🛒 Cart (<span id="count">0</span>)
</button>
</header>

<!-- ===== PRODUCT SECTION ===== -->
<div class="products" id="shop">

<div class="card">
<img src="https://picsum.photos/300?1">
<h3>Black Trouser</h3>
<p>৳1200</p>
<button onclick="addToCart('Black Trouser',1200)">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/300?2">
<h3>Denim Jeans</h3>
<p>৳1500</p>
<button onclick="addToCart('Denim Jeans',1500)">Add to Cart</button>
</div>

<div class="card">
<img src="https://picsum.photos/300?3">
<h3>T-Shirt</h3>
<p>৳800</p>
<button onclick="addToCart('T-Shirt',800)">Add to Cart</button>
</div>

</div>

<!-- ===== CART PAGE ===== -->
<div id="cartPage">
<h2>Your Cart</h2>

<div id="cartItems"></div>
<h3 id="total"></h3>

<input type="text" id="name" placeholder="Your Name"><br>
<input type="text" id="address" placeholder="Your Address"><br>

<button onclick="orderNow()">Order Now</button>
<button onclick="goBack()">⬅ Back</button>
</div>

<!-- ===== SCRIPT ===== -->
<script>

let cart = [];

/* ===== ADD TO CART ===== */
function addToCart(name,price){
cart.push({name,price});
updateCart();
alert("Added ✅");
}

/* ===== UPDATE CART ===== */
function updateCart(){
document.getElementById("count").innerText = cart.length;
}

/* ===== SHOW CART ===== */
function showCart(){
document.getElementById("shop").style.display="none";
document.getElementById("cartPage").style.display="block";

let itemsHTML="";
let total=0;

cart.forEach((item,i)=>{
itemsHTML += `<p>${item.name} - ৳${item.price}</p>`;
total += item.price;
});

document.getElementById("cartItems").innerHTML = itemsHTML;
document.getElementById("total").innerText = "Total: ৳" + total;

window.total = total;
}

/* ===== BACK ===== */
function goBack(){
document.getElementById("shop").style.display="grid";
document.getElementById("cartPage").style.display="none";
}

/* ===== ORDER ===== */
function orderNow(){

let name = document.getElementById("name").value;
let address = document.getElementById("address").value;

if(name=="" || address==""){
alert("Fill all fields ❌");
return;
}

alert("Order Placed ✅\n\nName: "+name+"\nTotal: ৳"+total+"\n\nSend money to bKash: 01XXXXXXXXX");

cart = [];
updateCart();
goBack();
}

</script>

</body>
</html>
